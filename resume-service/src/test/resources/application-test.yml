server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:resumedb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  main:
    lazy-initialization: true

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
